# Audio Bridge - Audio Policy Configuration
# Customize audio routing behavior

# Sample rate (Hz)
sample_rate=48000

# Channels (1=mono, 2=stereo)
channels=1

# Frame duration (ms)
frame_ms=20

# Opus bitrate for speaker capture (bps)
speaker_bitrate=64000

# Opus bitrate for virtual mic (bps)
mic_bitrate=32000

# Enable Forward Error Correction
fec_enabled=1

# Packet loss percentage hint for FEC
packet_loss_perc=10

# Jitter buffer frames
jitter_frames=6

# Ring buffer size (number of frames)
ring_size=64
