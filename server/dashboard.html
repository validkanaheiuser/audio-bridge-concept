<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>audio bridge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root[data-theme='dark'] {
    --bg: #050505; --card: #0d0d0d; --card-hover: #111;
    --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.12);
    --text: #f5f5f5; --dim: #a0a0a0; --muted: #606060;
    --accent: #f5f5f5; --accent-text: #000;
    --chip: #141414; --chip-hover: #1a1a1a; --input-bg: #0f0f0f;
    --danger: #ef4444; --good: #4ade80; --warn: #f59e0b;
    --scrim: rgba(0,0,0,0.7);
  }
  :root[data-theme='light'] {
    --bg: #f7f7f7; --card: #ffffff; --card-hover: #fafafa;
    --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.16);
    --text: #0a0a0a; --dim: #525252; --muted: #8a8a8a;
    --accent: #0a0a0a; --accent-text: #fff;
    --chip: #f0f0f0; --chip-hover: #e8e8e8; --input-bg: #f4f4f4;
    --danger: #dc2626; --good: #16a34a; --warn: #d97706;
    --scrim: rgba(255,255,255,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); }
  body { font-family: 'Inter', system-ui, sans-serif; min-height: 100vh;
         padding: 3rem 2rem 4rem; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1180px; margin: 0 auto; }

  /* header */
  .top { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 2.5rem; }
  .top-icon { width: 56px; height: 56px; border-radius: 14px;
    background: var(--chip) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z'/><path d='M19 10v2a7 7 0 0 1-14 0v-2'/><line x1='12' y1='19' x2='12' y2='22'/></svg>") center/60% no-repeat; flex-shrink: 0; }
  .top-text h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
                 line-height: 1.1; text-transform: lowercase; }
  .top-text p { font-size: 0.95rem; color: var(--muted); margin-top: 0.35rem; }
  .top-right { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }
  .connection { font-size: 0.75rem; color: var(--muted);
    padding: 0.35rem 0.75rem; border: 1px solid var(--border); border-radius: 999px;
    display: flex; align-items: center; gap: 0.5rem; }
  .connection .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .connection.online .dot { background: var(--good); box-shadow: 0 0 6px var(--good); }
  .connection.offline .dot { background: var(--danger); }
  .theme-toggle { width: 42px; height: 42px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border); cursor: pointer;
    display: grid; place-items: center; color: var(--text); }
  .theme-toggle:hover { background: var(--chip); border-color: var(--border-strong); }
  .theme-toggle svg { width: 18px; height: 18px; }

  /* grid */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 16px; padding: 1.5rem; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border-strong); }
  .card.full { grid-column: 1 / -1; }
  .card.hidden { display: none; }

  .label { font-size: 0.7rem; font-weight: 600; color: var(--muted);
           text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 1rem; }

  /* form */
  .field { margin-bottom: 0.75rem; }
  .field label { display: block; font-size: 0.72rem; color: var(--muted);
                 text-transform: lowercase; margin-bottom: 0.4rem; }
  input[type=text], input[type=tel], input[type=number], textarea {
    width: 100%; background: var(--input-bg); border: 1px solid transparent;
    border-radius: 10px; padding: 0.75rem 0.9rem; color: var(--text);
    font-family: inherit; font-size: 0.9rem; outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  input:focus, textarea:focus { border-color: var(--border-strong); background: var(--chip); }
  textarea { resize: vertical; min-height: 90px;
             font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

  /* buttons */
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.9rem; flex-wrap: wrap; }
  button { flex: 1; min-width: 0; padding: 0.72rem 1rem;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--chip); color: var(--text);
    font-family: inherit; font-weight: 500; font-size: 0.86rem;
    cursor: pointer; transition: all 0.15s;
    text-transform: lowercase; letter-spacing: 0.01em; }
  button:hover:not(:disabled) { background: var(--chip-hover); border-color: var(--border-strong); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: var(--accent-text);
                 border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover:not(:disabled) { filter: brightness(0.92); }
  .btn-danger { color: var(--danger); border-color: rgba(239,68,68,0.25); }
  .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.5); }
  .btn-good   { color: var(--good); border-color: rgba(74,222,128,0.25); }
  .btn-good:hover:not(:disabled) { background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.5); }

  /* devices */
  .devices { display: flex; flex-direction: column; gap: 0.5rem; }
  .device { padding: 0.85rem 1rem; border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; background: var(--chip);
    position: relative; transition: all 0.15s; }
  .device:hover { background: var(--chip-hover); border-color: var(--border-strong); }
  .device.selected { border-color: var(--text); background: var(--chip-hover); }
  .device-name { font-weight: 600; font-size: 0.92rem; }
  .device-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem;
                 font-family: 'JetBrains Mono', monospace; }
  .device-state { font-size: 0.75rem; margin-top: 0.35rem; color: var(--dim); }
  .device-badge { position: absolute; top: 0.7rem; right: 0.9rem;
    font-size: 0.7rem; padding: 0.2rem 0.55rem; border-radius: 999px;
    font-weight: 600; text-transform: lowercase; }
  .badge-ringing { background: rgba(239,68,68,0.15); color: var(--danger);
                   border: 1px solid rgba(239,68,68,0.4);
                   animation: pulse 1.1s ease-in-out infinite; }
  .badge-dialing { background: rgba(245,158,11,0.15); color: var(--warn);
                   border: 1px solid rgba(245,158,11,0.4); }
  .badge-active  { background: rgba(74,222,128,0.15); color: var(--good);
                   border: 1px solid rgba(74,222,128,0.4); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }
  .empty { padding: 2rem 1rem; color: var(--muted); font-size: 0.88rem;
           text-align: center; border: 1px dashed var(--border); border-radius: 12px; }

  /* audio card (hidden unless in active call) */
  .row { display: flex; gap: 0.75rem; align-items: flex-end; }
  .row > * { flex: 1; }
  .meters { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-top: 1rem; }
  .meter-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.3rem; }
  .meter-bar { height: 4px; background: var(--input-bg); border-radius: 999px; overflow: hidden; }
  .meter-fill { height: 100%; background: var(--text); width: 0%; transition: width 0.08s linear; }

  /* log */
  .log { background: var(--input-bg); border: 1px solid var(--border);
         border-radius: 12px; padding: 0.9rem 1rem;
         font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
         max-height: 240px; overflow-y: auto; color: var(--dim); line-height: 1.7; }
  .log-entry .t { color: var(--muted); margin-right: 0.75rem; }
  .log-entry.event .m { color: var(--good); }
  .log-entry.error .m { color: var(--danger); }
  .log-entry.audio .m { color: #a78bfa; }

  /* toasts */
  .toasts { position: fixed; top: 1rem; right: 1rem; display: flex;
    flex-direction: column; gap: 0.5rem; z-index: 2000; pointer-events: none; }
  .toast { background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.7rem 0.9rem; min-width: 220px; max-width: 380px;
    font-size: 0.85rem; animation: slideIn 0.2s ease-out;
    pointer-events: auto; cursor: pointer; }
  .toast.error { border-color: rgba(239,68,68,0.4); }
  .toast.event { border-color: rgba(74,222,128,0.3); }
  .toast .t-title { font-weight: 600; margin-bottom: 0.2rem; }
  .toast.error .t-title { color: var(--danger); }
  .toast.event .t-title { color: var(--good); }
  .toast .t-body { color: var(--dim); font-size: 0.78rem;
                   font-family: 'JetBrains Mono', monospace; }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; }
                       to   { transform: translateX(0); opacity: 1; } }

  /* modal */
  .modal-scrim { position: fixed; inset: 0; background: var(--scrim);
    display: none; align-items: center; justify-content: center;
    z-index: 1500; backdrop-filter: blur(4px); }
  .modal-scrim.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border-strong);
    border-radius: 20px; padding: 2rem; min-width: 340px; max-width: 460px; }
  .modal h2 { font-size: 0.75rem; text-transform: uppercase;
              letter-spacing: 0.14em; color: var(--muted); margin-bottom: 0.4rem; }
  .modal .number { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.01em;
                   margin-bottom: 0.3rem; word-break: break-all; }
  .modal .sub { font-size: 0.82rem; color: var(--dim); margin-bottom: 1.4rem; }
  .timer { font-family: 'JetBrains Mono', monospace; font-size: 2.6rem;
           font-weight: 700; letter-spacing: 0.03em; text-align: center;
           margin: 0.6rem 0 1.4rem; color: var(--good); }

  @media (max-width: 820px) {
    body { padding: 1.5rem 1rem 3rem; }
    .grid { grid-template-columns: 1fr; }
    .top-text h1 { font-size: 1.5rem; }
    .modal { min-width: 80vw; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-icon"></div>
    <div class="top-text">
      <h1>audio bridge</h1>
      <p>route calls, listen in, speak through</p>
    </div>
    <div class="top-right">
      <div class="connection offline" id="conn"><span class="dot"></span><span id="conn-text">offline</span></div>
      <button class="theme-toggle" id="theme-toggle">
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">devices</div>
      <div class="devices" id="devices">
        <div class="empty">no devices connected · configure the daemon on your phone</div>
      </div>
    </div>

    <div class="card">
      <div class="label">call</div>
      <div class="field">
        <label>phone number</label>
        <input type="tel" id="phone-number" placeholder="+1234567890">
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-dial" disabled>dial</button>
      </div>
    </div>

    <!-- audio card only visible while a call is ACTIVE -->
    <div class="card hidden" id="card-audio">
      <div class="label">audio</div>
      <div class="row">
        <div class="field" style="margin:0;">
          <label>sample rate</label>
          <input type="number" id="audio-rate" value="48000" min="8000" max="96000" step="100">
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-listen">listen</button>
        <button class="btn-primary" id="btn-mic">speak</button>
        <button id="btn-stop" disabled>stop</button>
      </div>
      <div class="meters">
        <div><div class="meter-label">rx · phone speaker</div>
             <div class="meter-bar"><div class="meter-fill" id="meter-rx"></div></div></div>
        <div><div class="meter-label">tx · your mic</div>
             <div class="meter-bar"><div class="meter-fill" id="meter-tx"></div></div></div>
      </div>
    </div>

    <div class="card">
      <div class="label">sms</div>
      <div class="field"><label>recipient</label>
        <input type="tel" id="sms-number" placeholder="+1234567890"></div>
      <div class="field"><label>message</label>
        <textarea id="sms-message" placeholder="type a message"></textarea></div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-sms" disabled>send</button>
      </div>
    </div>

    <div class="card full">
      <div class="label">events</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<!-- toast host -->
<div class="toasts" id="toasts"></div>

<!-- incoming call modal -->
<div class="modal-scrim" id="modal-ring">
  <div class="modal">
    <h2>incoming call</h2>
    <div class="number" id="ring-number">+1234567890</div>
    <div class="sub" id="ring-device">from device</div>
    <div class="btn-row">
      <button class="btn-good"  id="btn-answer">answer</button>
      <button class="btn-danger" id="btn-reject">reject</button>
    </div>
  </div>
</div>

<!-- in-call modal -->
<div class="modal-scrim" id="modal-call">
  <div class="modal">
    <h2 id="call-dir">outgoing</h2>
    <div class="number" id="call-number">+1234567890</div>
    <div class="sub" id="call-device">via device</div>
    <div class="timer" id="call-timer">00:00</div>
    <div class="btn-row">
      <button id="btn-mute">mute</button>
      <button class="btn-danger" id="btn-hangup">hang up</button>
    </div>
  </div>
</div>

<script>
/* ─── theme toggle ──────────────────────────────────────── */
const themeBtn = document.getElementById('theme-toggle');
const iconMoon = document.getElementById('icon-moon');
document.documentElement.setAttribute('data-theme',
  localStorage.getItem('ab-theme') || 'dark');
function paintThemeIcon() {
  const t = document.documentElement.getAttribute('data-theme');
  iconMoon.innerHTML = t === 'dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
}
paintThemeIcon();
themeBtn.onclick = () => {
  const t = document.documentElement.getAttribute('data-theme');
  const next = t === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ab-theme', next);
  paintThemeIcon();
};

/* ─── log + toasts ──────────────────────────────────────── */
function addLog(msg, type='info') {
  const area = document.getElementById('log');
  const e = document.createElement('div');
  e.className = 'log-entry ' + type;
  e.innerHTML = `<span class="t">${new Date().toLocaleTimeString()}</span>`
              + `<span class="m">${msg}</span>`;
  area.appendChild(e);
  area.scrollTop = area.scrollHeight;
  while (area.childElementCount > 250) area.removeChild(area.firstChild);
}
function toast(kind, title, body) {
  const host = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + (kind || 'event');
  t.innerHTML = `<div class="t-title">${title}</div><div class="t-body">${body}</div>`;
  t.onclick = () => t.remove();
  host.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

/* ─── state ─────────────────────────────────────────────── */
let ws = null;
let selectedDevice = null;
let devicesById = {};
let callTimerHandle = null;

function setConn(online) {
  const el = document.getElementById('conn');
  el.className = 'connection ' + (online ? 'online' : 'offline');
  document.getElementById('conn-text').textContent = online ? 'online' : 'offline';
}

function currentCall() {
  const d = selectedDevice && devicesById[selectedDevice];
  return (d && d.call) ? d.call : { state: 'IDLE', direction: 'unknown', number: '' };
}

function fmtDuration(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(s / 60), r = s % 60;
  return String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0');
}

/* ─── modals ────────────────────────────────────────────── */
function closeAllModals() {
  document.getElementById('modal-ring').classList.remove('open');
  document.getElementById('modal-call').classList.remove('open');
  if (callTimerHandle) { clearInterval(callTimerHandle); callTimerHandle = null; }
}
function showRingingModal(dev, call) {
  document.getElementById('ring-number').textContent = call.number || 'unknown';
  document.getElementById('ring-device').textContent = 'from ' + (dev.name || dev.id);
  document.getElementById('modal-ring').classList.add('open');
  document.getElementById('modal-call').classList.remove('open');
}
function showCallModal(dev, call) {
  document.getElementById('call-dir').textContent =
    call.direction === 'incoming' ? 'incoming call' : 'outgoing call';
  document.getElementById('call-number').textContent = call.number || 'unknown';
  document.getElementById('call-device').textContent = 'via ' + (dev.name || dev.id);
  document.getElementById('btn-mute').textContent = call.muted ? 'unmute' : 'mute';
  document.getElementById('modal-call').classList.add('open');
  document.getElementById('modal-ring').classList.remove('open');

  if (callTimerHandle) clearInterval(callTimerHandle);
  const started = call.started_at || Date.now();
  const tick = () => {
    document.getElementById('call-timer').textContent = fmtDuration(Date.now() - started);
  };
  tick();
  callTimerHandle = setInterval(tick, 500);
}
function paintAudioCard(show) {
  document.getElementById('card-audio').classList.toggle('hidden', !show);
  if (!show) stopAudio();
}

/* ─── render ────────────────────────────────────────────── */
function badge(call) {
  if (!call || !call.state || call.state === 'IDLE') return '';
  const cls = { RINGING: 'badge-ringing', DIALING: 'badge-dialing',
                ACTIVE:  'badge-active' }[call.state] || 'badge-active';
  return `<div class="device-badge ${cls}">${call.state.toLowerCase()}</div>`;
}

function renderDevices(devices) {
  devicesById = {};
  devices.forEach(d => devicesById[d.id] = d);

  const container = document.getElementById('devices');
  if (!devices || devices.length === 0) {
    container.innerHTML = '<div class="empty">no devices connected · configure the daemon on your phone</div>';
    selectedDevice = null;
    refreshCallUI();
    return;
  }
  let foundSelected = false;
  container.innerHTML = '';
  for (const d of devices) {
    if (selectedDevice === d.id) foundSelected = true;
    const call = d.call || {};
    const item = document.createElement('div');
    item.className = 'device' + (selectedDevice === d.id ? ' selected' : '');
    item.innerHTML =
      `<div class="device-name">${d.name || d.id}</div>` +
      `<div class="device-meta">${d.id}${d.android ? ' · android ' + d.android : ''}</div>` +
      `<div class="device-state">${(call.state || 'idle').toLowerCase()}` +
        `${call.number ? ' · ' + call.number : ''}</div>` +
      badge(call);
    item.onclick = () => { selectedDevice = d.id; renderDevices(devices); };
    container.appendChild(item);
  }
  if (!foundSelected) selectedDevice = devices[0].id;
  refreshCallUI();
}

function refreshCallUI() {
  const d = selectedDevice && devicesById[selectedDevice];
  const has = !!d;
  document.getElementById('btn-dial').disabled = !has;
  document.getElementById('btn-sms').disabled  = !has;

  if (!has) { closeAllModals(); paintAudioCard(false); return; }

  const call = d.call || { state: 'IDLE' };
  switch (call.state) {
    case 'RINGING':
      if (call.direction === 'incoming') {
        showRingingModal(d, call);
      } else {
        // Outgoing ringing is very brief; treat like dialing
        closeAllModals();
      }
      paintAudioCard(false);
      break;
    case 'DIALING':
      closeAllModals();
      paintAudioCard(false);
      break;
    case 'ACTIVE':
      showCallModal(d, call);
      paintAudioCard(true);
      break;
    case 'IDLE':
    default:
      closeAllModals();
      paintAudioCard(false);
  }
}

/* ─── control WS ────────────────────────────────────────── */
function connectUI() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/ws/ui');
  ws.onopen  = () => { setConn(true); addLog('control channel open', 'event'); };
  ws.onclose = () => { setConn(false); addLog('control channel lost · reconnecting', 'error');
                       setTimeout(connectUI, 3000); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'state_update') {
      renderDevices(data.devices);
    } else if (data.type === 'event') {
      const k = data.kind, p = data.data || {};
      if (k === 'error') {
        const op  = p.op || 'op', code = p.code || '?', msg = p.message || '';
        toast('error', `${op} failed · ${code}`, msg);
        addLog(`error · ${op} · ${code}: ${msg}`, 'error');
      } else if (k === 'call') {
        addLog(`call · ${p.state}${p.direction ? ' ('+p.direction+')' : ''}`
               + `${p.number ? ' · ' + p.number : ''}`, 'event');
      } else if (k === 'sms_received') {
        toast('event', 'SMS from ' + p.sender, p.message);
        addLog(`sms from ${p.sender}: ${p.message}`, 'event');
      } else if (k === 'sms_sent') {
        addLog(`sms sent · ${p.result || 'ok'}`, 'event');
      }
    }
  };
}

function cmd(o) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(o)); }

document.getElementById('btn-dial').onclick = () => {
  const num = document.getElementById('phone-number').value.trim();
  if (!num || !selectedDevice) return;
  cmd({ command: 'dial', device_id: selectedDevice, number: num });
  addLog(`dial → ${num}`);
};
document.getElementById('btn-answer').onclick = () => {
  if (!selectedDevice) return;
  cmd({ command: 'answer', device_id: selectedDevice });
};
document.getElementById('btn-reject').onclick = () => {
  if (!selectedDevice) return;
  cmd({ command: 'hangup', device_id: selectedDevice });
};
document.getElementById('btn-hangup').onclick = () => {
  if (!selectedDevice) return;
  cmd({ command: 'hangup', device_id: selectedDevice });
};
document.getElementById('btn-mute').onclick = () => {
  if (!selectedDevice) return;
  const call = currentCall();
  cmd({ command: 'mute', device_id: selectedDevice, on: !call.muted });
};
document.getElementById('btn-sms').onclick = () => {
  const num = document.getElementById('sms-number').value.trim();
  const msg = document.getElementById('sms-message').value.trim();
  if (!num || !msg || !selectedDevice) return;
  cmd({ command: 'send_sms', device_id: selectedDevice, number: num, message: msg });
  document.getElementById('sms-message').value = '';
  addLog(`sms → ${num}`);
};

/* ─── audio (unchanged wiring, now gated by call state) ─── */
let audioWs=null, audioCtx=null, playNode=null, micStream=null, micNode=null, playHead=0;
function peakMeter(id, pcm16) {
  let p = 0; for (let i=0;i<pcm16.length;i++) { const v=Math.abs(pcm16[i]); if (v>p) p=v; }
  document.getElementById(id).style.width = Math.min(100, (p/32768)*200) + '%';
}
async function ensureAudioCtx(rate) {
  if (audioCtx && audioCtx.sampleRate === rate) return;
  if (audioCtx) await audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: rate });
  const src = `
    class MicProc extends AudioWorkletProcessor {
      process(inputs) {
        const ch = inputs[0][0]; if (!ch) return true;
        const out = new Int16Array(ch.length);
        for (let i=0;i<ch.length;i++) {
          let s = Math.max(-1, Math.min(1, ch[i]));
          out[i] = s<0 ? s*0x8000 : s*0x7fff;
        }
        this.port.postMessage(out.buffer, [out.buffer]);
        return true;
      }
    }
    registerProcessor('mic-proc', MicProc);`;
  const blob = new Blob([src], { type: 'application/javascript' });
  await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
  playNode = audioCtx.createGain(); playNode.connect(audioCtx.destination);
}
function scheduleRxPCM(pcm16, rate) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, pcm16.length, rate);
  const data = buf.getChannelData(0);
  for (let i=0;i<pcm16.length;i++) data[i] = pcm16[i]/32768;
  const s = audioCtx.createBufferSource(); s.buffer = buf; s.connect(playNode);
  const now = audioCtx.currentTime;
  if (playHead < now + 0.05) playHead = now + 0.05;
  s.start(playHead); playHead += buf.duration;
}
async function startAudio(withMic) {
  if (!selectedDevice) return;
  const rate = parseInt(document.getElementById('audio-rate').value, 10) || 48000;
  await ensureAudioCtx(rate);
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  audioWs = new WebSocket(proto + '://' + location.host + '/ws/audio/' + selectedDevice
                          + '?rate=' + rate + '&dir=' + (withMic ? 'both' : 'listen'));
  audioWs.binaryType = 'arraybuffer';
  audioWs.onopen  = () => addLog(`audio stream open @ ${rate}Hz`, 'audio');
  audioWs.onclose = () => { addLog('audio stream closed', 'audio'); stopAudio(); };
  audioWs.onerror = () => addLog('audio stream error', 'error');
  audioWs.onmessage = (e) => {
    const pcm = new Int16Array(e.data);
    peakMeter('meter-rx', pcm); scheduleRxPCM(pcm, rate);
  };
  if (withMic) {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: rate, channelCount: 1 }
    });
    const s = audioCtx.createMediaStreamSource(micStream);
    micNode = new AudioWorkletNode(audioCtx, 'mic-proc');
    micNode.port.onmessage = (ev) => {
      const pcm = new Int16Array(ev.data);
      peakMeter('meter-tx', pcm);
      if (audioWs && audioWs.readyState === WebSocket.OPEN) audioWs.send(ev.data);
    };
    s.connect(micNode);
  }
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('btn-listen').disabled = true;
  document.getElementById('btn-mic').disabled = true;
}
function stopAudio() {
  if (audioWs)    { try { audioWs.close(); } catch(e){} audioWs = null; }
  if (micNode)    { try { micNode.disconnect(); } catch(e){} micNode = null; }
  if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  playHead = 0;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-listen').disabled = !selectedDevice;
  document.getElementById('btn-mic').disabled = !selectedDevice;
  document.getElementById('meter-rx').style.width = '0%';
  document.getElementById('meter-tx').style.width = '0%';
}
document.getElementById('btn-listen').onclick = () => startAudio(false);
document.getElementById('btn-mic').onclick    = () => startAudio(true);
document.getElementById('btn-stop').onclick   = () => stopAudio();

connectUI();
</script>
