<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>audio bridge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root[data-theme='dark'] {
    --bg: #050505;
    --card: #0d0d0d;
    --card-hover: #111;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.12);
    --text: #f5f5f5;
    --dim: #a0a0a0;
    --muted: #606060;
    --accent: #f5f5f5;
    --accent-text: #000;
    --chip: #141414;
    --chip-hover: #1a1a1a;
    --input-bg: #0f0f0f;
    --danger: #ef4444;
    --good: #4ade80;
  }
  :root[data-theme='light'] {
    --bg: #f7f7f7;
    --card: #ffffff;
    --card-hover: #fafafa;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.16);
    --text: #0a0a0a;
    --dim: #525252;
    --muted: #8a8a8a;
    --accent: #0a0a0a;
    --accent-text: #fff;
    --chip: #f0f0f0;
    --chip-hover: #e8e8e8;
    --input-bg: #f4f4f4;
    --danger: #dc2626;
    --good: #16a34a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    min-height: 100vh;
    padding: 3rem 2rem 4rem;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ── header ───────────────────────────────────────── */
  .top {
    display: flex; align-items: flex-start; gap: 1rem;
    margin-bottom: 2.5rem;
  }
  .top-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--chip) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z'/><path d='M19 10v2a7 7 0 0 1-14 0v-2'/><line x1='12' y1='19' x2='12' y2='22'/></svg>") center/60% no-repeat;
    flex-shrink: 0;
  }
  .top-text h1 {
    font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.1; text-transform: lowercase;
  }
  .top-text p {
    font-size: 0.95rem; color: var(--muted); margin-top: 0.35rem;
  }
  .top-right { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }
  .connection {
    font-size: 0.75rem; color: var(--muted); padding: 0.35rem 0.75rem;
    border: 1px solid var(--border); border-radius: 999px;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .connection .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .connection.online .dot { background: var(--good); box-shadow: 0 0 6px var(--good); }
  .connection.offline .dot { background: var(--danger); }
  .theme-toggle {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border);
    cursor: pointer; display: grid; place-items: center;
    color: var(--text); transition: background 0.15s, border-color 0.15s;
  }
  .theme-toggle:hover { background: var(--chip); border-color: var(--border-strong); }
  .theme-toggle svg { width: 18px; height: 18px; }

  /* ── grid / cards ─────────────────────────────────── */
  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:hover { border-color: var(--border-strong); }
  .card.full { grid-column: 1 / -1; }

  .label {
    font-size: 0.7rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 1rem;
  }

  /* ── form controls ────────────────────────────────── */
  .field { margin-bottom: 0.75rem; }
  .field label {
    display: block; font-size: 0.72rem; color: var(--muted);
    text-transform: lowercase; letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
  }
  input[type=text], input[type=tel], input[type=number], textarea {
    width: 100%; background: var(--input-bg); border: 1px solid transparent;
    border-radius: 10px; padding: 0.75rem 0.9rem;
    color: var(--text); font-family: inherit; font-size: 0.9rem;
    outline: none; transition: border-color 0.15s, background 0.15s;
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  input:focus, textarea:focus { border-color: var(--border-strong); background: var(--chip); }
  textarea { resize: vertical; min-height: 90px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

  /* ── buttons ──────────────────────────────────────── */
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.9rem; flex-wrap: wrap; }
  button {
    flex: 1; min-width: 0; padding: 0.72rem 1rem;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--chip); color: var(--text);
    font-family: inherit; font-weight: 500; font-size: 0.86rem;
    cursor: pointer; transition: all 0.15s;
    text-transform: lowercase; letter-spacing: 0.01em;
  }
  button:hover:not(:disabled) { background: var(--chip-hover); border-color: var(--border-strong); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent); color: var(--accent-text);
    border-color: var(--accent); font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); filter: brightness(0.92); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }

  /* ── device list ──────────────────────────────────── */
  .devices { display: flex; flex-direction: column; gap: 0.5rem; }
  .device {
    padding: 0.85rem 1rem; border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; transition: all 0.15s;
    background: var(--chip);
  }
  .device:hover { background: var(--chip-hover); border-color: var(--border-strong); }
  .device.selected {
    border-color: var(--text); background: var(--chip-hover);
  }
  .device-name { font-weight: 600; font-size: 0.92rem; }
  .device-meta {
    font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .device-state {
    font-size: 0.75rem; margin-top: 0.35rem;
    color: var(--dim);
  }
  .device.calling .device-state { color: var(--good); }
  .empty {
    padding: 2rem 1rem; color: var(--muted); font-size: 0.88rem;
    text-align: center; border: 1px dashed var(--border); border-radius: 12px;
  }

  /* ── audio bridge card ────────────────────────────── */
  .row { display: flex; gap: 0.75rem; align-items: flex-end; }
  .row > * { flex: 1; }
  .meters { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-top: 1rem; }
  .meter { }
  .meter-label {
    font-size: 0.7rem; color: var(--muted); text-transform: lowercase;
    margin-bottom: 0.3rem; letter-spacing: 0.02em;
  }
  .meter-bar {
    height: 4px; background: var(--input-bg); border-radius: 999px; overflow: hidden;
  }
  .meter-fill { height: 100%; background: var(--text); width: 0%; transition: width 0.08s linear; }
  .badge {
    font-size: 0.7rem; color: var(--muted); padding: 0.15rem 0.55rem;
    background: var(--chip); border: 1px solid var(--border);
    border-radius: 999px; display: inline-flex; align-items: center; gap: 0.35rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
  .badge.live .dot { background: var(--good); box-shadow: 0 0 5px var(--good); }

  /* ── log ──────────────────────────────────────────── */
  .log {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.9rem 1rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
    max-height: 240px; overflow-y: auto; color: var(--dim);
    line-height: 1.7;
  }
  .log-entry { word-break: break-word; }
  .log-entry .t { color: var(--muted); margin-right: 0.75rem; }
  .log-entry.event .m { color: var(--good); }
  .log-entry.error .m { color: var(--danger); }
  .log-entry.audio .m { color: #a78bfa; }

  @media (max-width: 820px) {
    body { padding: 1.5rem 1rem 3rem; }
    .grid { grid-template-columns: 1fr; }
    .top-text h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- header -->
  <div class="top">
    <div class="top-icon"></div>
    <div class="top-text">
      <h1>audio bridge</h1>
      <p>route calls, listen in, speak through</p>
    </div>
    <div class="top-right">
      <div class="connection offline" id="conn"><span class="dot"></span><span id="conn-text">offline</span></div>
      <button class="theme-toggle" id="theme-toggle" title="toggle theme">
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="grid">

    <!-- devices -->
    <div class="card">
      <div class="label">devices</div>
      <div class="devices" id="devices">
        <div class="empty">no devices connected · configure the daemon on your phone</div>
      </div>
    </div>

    <!-- calls -->
    <div class="card">
      <div class="label">call</div>
      <div class="field">
        <label>phone number</label>
        <input type="tel" id="phone-number" placeholder="+1234567890">
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-dial" disabled>dial</button>
        <button id="btn-answer" disabled>answer</button>
        <button class="btn-danger" id="btn-hangup" disabled>hang up</button>
      </div>
    </div>

    <!-- audio bridge -->
    <div class="card">
      <div class="label" style="display:flex; align-items:center; justify-content:space-between;">
        <span>audio</span>
        <span class="badge" id="audio-badge"><span class="dot"></span><span id="audio-state">idle</span></span>
      </div>
      <div class="row">
        <div class="field" style="margin:0;">
          <label>sample rate</label>
          <input type="number" id="audio-rate" value="48000" min="8000" max="96000" step="100">
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-listen" disabled>listen</button>
        <button class="btn-primary" id="btn-mic" disabled>speak</button>
        <button id="btn-stop" disabled>stop</button>
      </div>
      <div class="meters">
        <div class="meter">
          <div class="meter-label">rx · phone speaker</div>
          <div class="meter-bar"><div class="meter-fill" id="meter-rx"></div></div>
        </div>
        <div class="meter">
          <div class="meter-label">tx · your mic</div>
          <div class="meter-bar"><div class="meter-fill" id="meter-tx"></div></div>
        </div>
      </div>
    </div>

    <!-- sms -->
    <div class="card">
      <div class="label">sms</div>
      <div class="field">
        <label>recipient</label>
        <input type="tel" id="sms-number" placeholder="+1234567890">
      </div>
      <div class="field">
        <label>message</label>
        <textarea id="sms-message" placeholder="type a message"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-sms" disabled>send</button>
      </div>
    </div>

    <!-- log -->
    <div class="card full">
      <div class="label">events</div>
      <div class="log" id="log"></div>
    </div>

  </div>
</div>

<script>
// ─── theme toggle ────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-toggle');
const iconMoon = document.getElementById('icon-moon');
const savedTheme = localStorage.getItem('ab-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
function paintThemeIcon() {
  const t = document.documentElement.getAttribute('data-theme');
  iconMoon.innerHTML = t === 'dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
}
paintThemeIcon();
themeBtn.onclick = () => {
  const t = document.documentElement.getAttribute('data-theme');
  const next = t === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ab-theme', next);
  paintThemeIcon();
};

// ─── event log ───────────────────────────────────────────────────
function addLog(msg, type='info') {
  const area = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  const t = new Date().toLocaleTimeString();
  entry.innerHTML = `<span class="t">${t}</span><span class="m">${msg}</span>`;
  area.appendChild(entry);
  area.scrollTop = area.scrollHeight;
  while (area.childElementCount > 250) area.removeChild(area.firstChild);
}

// ─── control ws ──────────────────────────────────────────────────
let ws = null;
let selectedDevice = null;

function setConn(online) {
  const el = document.getElementById('conn');
  el.className = 'connection ' + (online ? 'online' : 'offline');
  document.getElementById('conn-text').textContent = online ? 'online' : 'offline';
}

function updateButtons() {
  const has = !!selectedDevice;
  for (const id of ['btn-dial','btn-answer','btn-hangup','btn-sms','btn-listen','btn-mic']) {
    document.getElementById(id).disabled = !has;
  }
}

function renderDevices(devices) {
  const container = document.getElementById('devices');
  if (!devices || devices.length === 0) {
    container.innerHTML = '<div class="empty">no devices connected · configure the daemon on your phone</div>';
    selectedDevice = null;
    updateButtons();
    return;
  }
  let foundSelected = false;
  container.innerHTML = '';
  for (const d of devices) {
    if (selectedDevice === d.id) foundSelected = true;
    const item = document.createElement('div');
    const calling = d.state && d.state !== 'IDLE';
    item.className = 'device' + (selectedDevice === d.id ? ' selected' : '') + (calling ? ' calling' : '');
    item.innerHTML =
      `<div class="device-name">${d.name || d.id}</div>` +
      `<div class="device-meta">${d.id}${d.android ? ' · android ' + d.android : ''}</div>` +
      `<div class="device-state">${(d.state || 'idle').toLowerCase()}${d.number ? ' · ' + d.number : ''}</div>`;
    item.onclick = () => { selectedDevice = d.id; renderDevices(devices); updateButtons(); };
    container.appendChild(item);
  }
  if (!foundSelected) { selectedDevice = devices[0].id; renderDevices(devices); }
  updateButtons();
}

function connectUI() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/ws/ui');
  ws.onopen = () => { setConn(true); addLog('control channel open', 'event'); };
  ws.onclose = () => { setConn(false); addLog('control channel lost · reconnecting', 'error'); setTimeout(connectUI, 3000); };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'state_update') renderDevices(data.devices);
    else if (data.event || data.type) addLog(JSON.stringify(data), 'event');
  };
}

document.getElementById('btn-dial').onclick = () => {
  const num = document.getElementById('phone-number').value.trim();
  if (!num || !selectedDevice) return;
  ws.send(JSON.stringify({ command: 'dial', device_id: selectedDevice, number: num }));
  addLog(`dial → ${num}`);
};
document.getElementById('btn-answer').onclick = () => {
  if (!selectedDevice) return;
  ws.send(JSON.stringify({ command: 'answer', device_id: selectedDevice }));
};
document.getElementById('btn-hangup').onclick = () => {
  if (!selectedDevice) return;
  ws.send(JSON.stringify({ command: 'hangup', device_id: selectedDevice }));
};
document.getElementById('btn-sms').onclick = () => {
  const num = document.getElementById('sms-number').value.trim();
  const msg = document.getElementById('sms-message').value.trim();
  if (!num || !msg || !selectedDevice) return;
  ws.send(JSON.stringify({ command: 'send_sms', device_id: selectedDevice, number: num, message: msg }));
  document.getElementById('sms-message').value = '';
  addLog(`sms → ${num}`);
};

// ─── audio ───────────────────────────────────────────────────────
let audioWs = null;
let audioCtx = null;
let playNode = null;
let micStream = null;
let micNode = null;
let playHead = 0;

function setAudioState(label) {
  const b = document.getElementById('audio-badge');
  document.getElementById('audio-state').textContent = label;
  b.classList.toggle('live', label !== 'idle');
}

function peakMeter(id, pcm16) {
  let peak = 0;
  for (let i = 0; i < pcm16.length; i++) {
    const v = Math.abs(pcm16[i]);
    if (v > peak) peak = v;
  }
  const pct = Math.min(100, (peak / 32768) * 200);
  document.getElementById(id).style.width = pct + '%';
}

async function ensureAudioCtx(rate) {
  if (audioCtx && audioCtx.sampleRate === rate) return;
  if (audioCtx) await audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: rate });
  const workletSrc = `
    class MicProc extends AudioWorkletProcessor {
      process(inputs) {
        const ch = inputs[0][0];
        if (!ch) return true;
        const out = new Int16Array(ch.length);
        for (let i = 0; i < ch.length; i++) {
          let s = Math.max(-1, Math.min(1, ch[i]));
          out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        this.port.postMessage(out.buffer, [out.buffer]);
        return true;
      }
    }
    registerProcessor('mic-proc', MicProc);
  `;
  const blob = new Blob([workletSrc], { type: 'application/javascript' });
  await audioCtx.audioWorklet.addModule(URL.createObjectURL(blob));
  playNode = audioCtx.createGain();
  playNode.connect(audioCtx.destination);
}

function scheduleRxPCM(pcm16, rate) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, pcm16.length, rate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < pcm16.length; i++) data[i] = pcm16[i] / 32768;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(playNode);
  const now = audioCtx.currentTime;
  if (playHead < now + 0.05) playHead = now + 0.05;
  src.start(playHead);
  playHead += buf.duration;
}

async function startAudio(withMic) {
  if (!selectedDevice) return;
  const rate = parseInt(document.getElementById('audio-rate').value, 10) || 48000;
  await ensureAudioCtx(rate);
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = proto + '://' + location.host + '/ws/audio/' + selectedDevice +
              '?rate=' + rate + '&dir=' + (withMic ? 'both' : 'listen');
  audioWs = new WebSocket(url);
  audioWs.binaryType = 'arraybuffer';
  audioWs.onopen = () => {
    addLog(`audio stream open @ ${rate}Hz (${withMic ? 'duplex' : 'listen'})`, 'audio');
    setAudioState(withMic ? 'duplex' : 'listen');
  };
  audioWs.onclose = () => { addLog('audio stream closed', 'audio'); stopAudio(); };
  audioWs.onerror = () => { addLog('audio stream error', 'error'); };
  audioWs.onmessage = (e) => {
    const pcm = new Int16Array(e.data);
    peakMeter('meter-rx', pcm);
    scheduleRxPCM(pcm, rate);
  };

  if (withMic) {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: rate, channelCount: 1 }
    });
    const source = audioCtx.createMediaStreamSource(micStream);
    micNode = new AudioWorkletNode(audioCtx, 'mic-proc');
    micNode.port.onmessage = (ev) => {
      const pcm = new Int16Array(ev.data);
      peakMeter('meter-tx', pcm);
      if (audioWs && audioWs.readyState === WebSocket.OPEN) audioWs.send(ev.data);
    };
    source.connect(micNode);
  }

  document.getElementById('btn-stop').disabled = false;
  document.getElementById('btn-listen').disabled = true;
  document.getElementById('btn-mic').disabled = true;
}

function stopAudio() {
  if (audioWs) { try { audioWs.close(); } catch (e) {} audioWs = null; }
  if (micNode) { try { micNode.disconnect(); } catch (e) {} micNode = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  playHead = 0;
  setAudioState('idle');
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('btn-listen').disabled = !selectedDevice;
  document.getElementById('btn-mic').disabled = !selectedDevice;
  document.getElementById('meter-rx').style.width = '0%';
  document.getElementById('meter-tx').style.width = '0%';
}

document.getElementById('btn-listen').onclick = () => startAudio(false);
document.getElementById('btn-mic').onclick = () => startAudio(true);
document.getElementById('btn-stop').onclick = () => stopAudio();

connectUI();
</script>
</body>
</html>
